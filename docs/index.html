<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>剧本模拟器</title>
  <link rel="manifest" href="/manifest.json">
  <style>:root {
  --bg: #10131a;
  --bg-elevated: #171b24;
  --bg-card: #1d2330;
  --bg-input: #111722;
  --text: #f3f0e8;
  --text-dim: #a4acb8;
  --text-muted: #747f8f;
  --accent: #ff5f6d;
  --accent-strong: #ff7a59;
  --accent-soft: rgba(255, 95, 109, 0.14);
  --success: #65c18c;
  --warning: #f0b84f;
  --border: rgba(255, 255, 255, 0.1);
  --border-strong: rgba(255, 255, 255, 0.18);
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
  --radius: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --content-max: 960px;
  --reader-max: 760px;
  --tap-size: 44px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255, 95, 109, 0.12), transparent 34%),
    linear-gradient(135deg, #0b0d12 0%, #151922 56%, #10131a 100%);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
}

#app {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0) 180px),
    var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ===== Desktop / Tablet ===== */
@media (min-width: 768px) {
  body {
    display: block;
  }
  #app {
    max-width: 100%;
    border-radius: 0;
    box-shadow: none;
    margin-top: 0;
  }
  .page-scroll {
    max-width: var(--reader-max);
    margin: 0 auto;
    padding: 24px 32px;
  }
  .chat-page {
    max-width: 100%;
  }
  .chat-messages {
    max-width: var(--reader-max);
    margin: 0 auto;
  }
}

/* ===== Wide Desktop ===== */
@media (min-width: 900px) {
  #app[data-page="editor"] {
    max-width: 100%;
  }
  #app[data-page="editor"] .page-scroll {
    max-width: var(--content-max);
  }
  #app[data-page="editor"] .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  #app[data-page="editor"] .editor-grid > .editor-section {
    margin-bottom: 0;
  }
  #app[data-page="editor"] .editor-full {
    grid-column: 1 / -1;
  }
}

/* ===== Pages ===== */
.page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: absolute;
  top: 0; left: 0;
  animation: fadeIn 0.2s ease;
  overflow: hidden;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.page-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: calc(16px + var(--safe-bottom));
  width: 100%;
  min-height: 0;
  scrollbar-color: rgba(255,255,255,0.2) transparent;
  scrollbar-gutter: stable both-edges;
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(16, 19, 26, 0.9);
  backdrop-filter: blur(14px);
  flex-shrink: 0;
  min-height: 57px;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-btn {
  background: rgba(255,255,255,0.035); border: 1px solid transparent; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
  min-width: var(--tap-size);
  min-height: var(--tap-size);
  border-radius: var(--radius);
  transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
}
.header-btn:hover { color: var(--text); background: rgba(255,255,255,0.075); border-color: var(--border); }
.header-btn:active { transform: translateY(1px); }

/* ===== Cards ===== */
.card {
  background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01)), var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: rgba(255, 95, 109, 0.55); box-shadow: 0 10px 28px rgba(0,0,0,0.18); transform: translateY(-1px); }
.card h3 { font-size: 16px; margin-bottom: 6px; letter-spacing: 0; }
.card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.card-tag {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  background: rgba(255,255,255,0.055);
  color: var(--text-dim);
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 999px;
  margin-top: 8px;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 24px;
  border-radius: var(--radius);
  border: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  gap: 8px;
  min-height: var(--tap-size);
  line-height: 1.25;
  text-align: center;
  white-space: normal;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #fff; box-shadow: 0 10px 22px rgba(255, 95, 109, 0.22); }
.btn-primary:hover { filter: brightness(1.08); box-shadow: 0 12px 28px rgba(255, 95, 109, 0.3); }
.btn-secondary { background: rgba(255,255,255,0.045); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: rgba(255, 95, 109, 0.52); background: rgba(255,255,255,0.07); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid transparent; }
.btn-ghost:hover { color: var(--accent); background: var(--accent-soft); }
.btn-danger {
  background: rgba(255, 95, 109, 0.055);
  color: #ffb0a0;
  border: 1px solid rgba(255, 95, 109, 0.42);
}
.btn-danger:hover {
  color: #fff;
  background: rgba(255, 95, 109, 0.16);
  border-color: rgba(255, 95, 109, 0.7);
}
.btn:active { transform: translateY(1px); }
.btn:disabled,
.chat-send:disabled,
.chat-option-btn:disabled,
.form-input:disabled {
  cursor: not-allowed;
  opacity: 0.58;
  filter: grayscale(0.15);
}
.btn-block { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 13px; min-height: 38px; }

/* ===== Home ===== */
.home-header {
  align-items: flex-start;
  padding: 18px 16px;
}
.home-header > div {
  flex: 1;
  min-width: 0;
}
.home-header #btn-settings {
  flex-shrink: 0;
  margin-left: auto;
}
.home-header h1 { line-height: 1.2; }
.home-header p {
  margin-top: 4px;
  color: var(--text-dim);
  font-size: 12px;
}
.home-scroll {
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.home-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.summary-item {
  min-width: 0;
  padding: 14px;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.012)), var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.summary-wide { grid-column: 1 / -1; }
.summary-value {
  display: block;
  color: var(--text);
  font-size: 22px;
  font-weight: 700;
  line-height: 1.2;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.summary-label {
  display: block;
  margin-top: 4px;
  color: var(--text-muted);
  font-size: 12px;
}
.home-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.section-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.section-toolbar h2 {
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.toolbar-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.section-count {
  color: var(--text-dim);
  font-size: 12px;
}
.home-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.home-card {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 0;
  cursor: default;
}
.card-meta-line {
  color: var(--text-muted);
  font-size: 11px;
  margin-bottom: -6px;
}
.card-main {
  min-width: 0;
}
.card-main h3 {
  overflow-wrap: anywhere;
}
.card-main p {
  margin-top: 4px;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.card-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding-top: 2px;
}
.card-time {
  font-size: 11px;
}
.muted-row {
  padding: 12px 0;
  color: var(--text-dim);
  font-size: 13px;
}
.empty-panel {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  padding: 22px;
  background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01)), var(--bg-elevated);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}
.empty-mark {
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: #ffb0a0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
}
.empty-panel h3 {
  font-size: 17px;
}
.empty-panel p {
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.5;
}
.empty-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

@media (min-width: 768px) {
  .home-summary {
    grid-template-columns: 1fr 1fr 2fr;
  }
  .summary-wide { grid-column: auto; }
  .home-card {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    align-items: center;
    column-gap: 16px;
    row-gap: 10px;
  }
  .card-meta-line {
    grid-column: 1 / -1;
    margin-bottom: 0;
  }
  .card-main {
    grid-column: 1;
  }
  .card-actions {
    grid-column: 2;
    grid-row: 2;
  }
  .card-actions {
    flex-shrink: 0;
    justify-content: flex-end;
  }
}

/* ===== Form ===== */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 650; }
.form-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  min-height: var(--tap-size);
}
.form-input:focus { border-color: rgba(255, 95, 109, 0.72); background: #121a28; box-shadow: 0 0 0 3px rgba(255, 95, 109, 0.12); }
.form-input::placeholder { color: var(--text-dim); }
select.form-input {
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
    linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
  background-position:
    calc(100% - 18px) 50%,
    calc(100% - 12px) 50%;
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
  padding-right: 36px;
}
textarea.form-input { line-height: 1.55; resize: vertical; }

/* ===== Setup Wizard ===== */
.wizard-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 28px 20px;
  flex: 1;
  overflow-y: auto;
  width: 100%;
}
.wizard-step h2 { font-size: 24px; margin-bottom: 8px; line-height: 1.25; }
.wizard-step p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; max-width: 560px; }
.wizard-options { width: 100%; max-width: 400px; }
.wizard-option {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.wizard-option:hover, .wizard-option.selected {
  border-color: rgba(255, 95, 109, 0.68);
  background: var(--accent-soft);
}
.wizard-progress {
  display: flex;
  gap: 6px;
  margin-bottom: 32px;
}
.wizard-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.wizard-dot.active { background: var(--accent); box-shadow: 0 0 0 5px rgba(255, 95, 109, 0.12); }
.wizard-dot.done { background: var(--text-dim); }
.wizard-nav {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  width: 100%;
  max-width: 400px;
  flex-shrink: 0;
}
.wizard-nav .btn { flex-shrink: 0; white-space: nowrap; padding: 10px 16px; text-align: center; }
.wizard-nav .btn-block { flex: 1; min-width: 0; width: auto; }

/* ===== Chat ===== */
.chat-page { background: var(--bg); display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; position: relative; }
.chat-body { display: flex; flex: 1; min-height: 0; position: relative; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-right: 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
  width: 100%;
}
.chat-messages::-webkit-scrollbar { display: none; }
.chat-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 2px;
  justify-content: center;
  flex-shrink: 0;
  padding-right: 8px;
}
.chat-nav-btn {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.chat-nav-btn:hover { color: var(--text); border-color: var(--accent); }
.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.msg-ai {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
}
.msg-player {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
}
.msg-system {
  align-self: center;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 12px;
  padding: 6px 14px;
}
.msg-regen {
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  margin-top: 8px;
  padding: 4px 8px;
  display: inline-block;
  opacity: 0.6;
  transition: opacity 0.2s;
  border-radius: 6px;
}
.msg-regen:hover { opacity: 1; color: var(--accent); background: var(--accent-soft); }
.msg-values {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  padding: 4px 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  display: inline-block;
}

.state-timeline {
  margin-top: 14px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.timeline-title {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.timeline-empty {
  color: var(--text-dim);
  font-size: 12px;
  margin: 0;
}
.timeline-item {
  display: grid;
  grid-template-columns: 10px 1fr;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 12px;
}
.timeline-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 5px;
}
.timeline-time {
  color: var(--text-dim);
  font-size: 11px;
  margin-bottom: 2px;
}
.timeline-detail {
  color: var(--text);
  line-height: 1.45;
}

.chat-input-bar {
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0) 180px),
    var(--bg);
  z-index: 5;
}
.chat-input-bar > * {
  width: 100%;
  max-width: var(--reader-max);
  margin-left: auto;
  margin-right: auto;
}
.chat-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  max-height: 112px;
  overflow-y: auto;
}
.chat-option-btn {
  padding: 8px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 38px;
  text-align: left;
  white-space: normal;
}
.chat-option-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
.chat-row { display: flex; gap: 10px; }
.chat-textarea {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 120px;
  font-family: inherit;
  line-height: 1.45;
}
.chat-textarea:focus { border-color: var(--accent); }
.chat-send {
  width: var(--tap-size); height: var(--tap-size);
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== Numerical Panel ===== */
.numerical-panel {
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  padding: 0 16px;
  flex-shrink: 0;
}
.numerical-panel.open {
  max-height: min(240px, 38dvh);
  overflow-y: auto;
  padding: 12px 16px;
}
.numerical-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 12px;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.numerical-toggle:hover { color: var(--text); }
.num-group { margin-bottom: 12px; }
.num-group-title { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.num-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 13px;
  padding: 3px 0;
}
.num-label { color: var(--text-dim); overflow-wrap: anywhere; }
.num-value { font-weight: 600; font-variant-numeric: tabular-nums; }

/* ===== Settings ===== */
.settings-section { margin-bottom: 28px; }
.settings-section h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; }

/* ===== Memory Button ===== */
.memory-prompt {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  background: var(--accent-soft);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  animation: fadeIn 0.3s ease;
}
.memory-prompt:hover { filter: brightness(0.9); }

/* ===== Loading ===== */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  align-self: flex-start;
}
.typing-dot {
  width: 6px; height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-dim);
  text-align: center;
  padding: 40px;
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; margin-bottom: 20px; }

/* ===== Editor Sections ===== */
.editor-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.editor-back-btn,
.editor-action-btn,
.editor-save-btn {
  width: auto;
  min-width: 0;
  padding: 0 13px;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}
.editor-back-btn {
  color: var(--text);
}
.editor-action-btn {
  color: var(--text-dim);
}
.editor-save-btn {
  color: #fff;
  border-color: rgba(255, 95, 109, 0.38);
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  box-shadow: 0 10px 22px rgba(255, 95, 109, 0.22);
}
.editor-save-btn:hover {
  color: #fff;
  border-color: rgba(255, 255, 255, 0.18);
}
#app[data-page="editor"]:has(.editor-section .card[style*="border-color:var(--accent)"])::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 19;
  background: rgba(0, 0, 0, 0.48);
  backdrop-filter: blur(4px);
}
.editor-section .card[style*="border-color:var(--accent)"] {
  position: fixed;
  left: 50%;
  top: 76px;
  z-index: 20;
  width: min(680px, calc(100vw - 32px));
  max-height: calc(100dvh - 104px);
  margin: 0;
  overflow-y: auto;
  cursor: default;
  transform: translateX(-50%);
  box-shadow: var(--shadow);
}
.editor-section .card[style*="border-color:var(--accent)"]:hover {
  transform: translateX(-50%);
}
.editor-section .card[style*="border-color:var(--accent)"] > div:last-child {
  position: sticky;
  bottom: -16px;
  margin: 16px -16px -16px;
  padding: 12px 16px;
  background: rgba(29, 35, 48, 0.96);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(10px);
}
.editor-section {
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--bg-card);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  user-select: none;
  transition: background 0.15s;
}
.section-header:hover { background: var(--bg-input); }
.section-header.open { border-bottom: 1px solid var(--border); }
.section-arrow { font-size: 10px; color: var(--text-dim); width: 14px; text-align: center; }
.section-body { padding: 12px 16px; }

.validation-panel {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 14px;
  background: var(--bg-card);
}
.validation-panel.ok { border-color: rgba(76, 175, 80, 0.45); }
.validation-panel.warning { border-color: rgba(255, 193, 7, 0.45); }
.validation-panel.error { border-color: rgba(236, 76, 111, 0.55); }
.validation-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.validation-list {
  margin-top: 10px;
}
.validation-list span {
  display: block;
  color: var(--text-dim);
  font-size: 11px;
  margin-bottom: 4px;
}
.validation-list p {
  margin: 3px 0;
  font-size: 12px;
  line-height: 1.4;
  overflow-wrap: anywhere;
}

/* ===== Field Tags (for forbidden / requirements) ===== */
.field-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.field-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 16px;
  font-size: 12px;
  line-height: 1.4;
  max-width: 100%;
  overflow-wrap: anywhere;
}
.field-tag-x {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
  line-height: 1;
  opacity: 0.7;
}
.field-tag-x:hover { opacity: 1; }

/* ===== Condition Rows ===== */
.condition-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.condition-row {
  display: flex;
  gap: 4px;
  align-items: center;
  min-width: 0;
}

/* ===== Option Rows ===== */
.option-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.option-row {
  display: flex;
  gap: 4px;
  align-items: center;
  min-width: 0;
}

/* ===== Responsive Polish ===== */
@media (max-width: 767px) {
  :root {
    --radius: 10px;
  }

  .page-scroll {
    padding: 14px;
    padding-bottom: calc(18px + var(--safe-bottom));
  }

  .header {
    padding: 8px 10px;
    gap: 6px;
  }

  .home-header {
    align-items: center;
  }

  .home-header > div {
    min-width: 0;
  }

  .section-toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .toolbar-actions,
  .card-actions,
  .empty-actions {
    width: 100%;
  }

  .toolbar-actions .btn,
  .card-actions .btn,
  .empty-actions .btn {
    flex: 1 1 92px;
  }

  .card {
    padding: 14px;
  }

  .wizard-step {
    align-items: stretch;
    text-align: left;
    padding: 18px 14px calc(18px + var(--safe-bottom));
  }

  .wizard-step h2 {
    font-size: 20px;
  }

  .wizard-options,
  .wizard-nav {
    max-width: none;
  }

  .wizard-progress {
    align-self: center;
    max-width: 100%;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .wizard-nav {
    position: sticky;
    bottom: 0;
    padding-top: 10px;
    background: linear-gradient(180deg, rgba(26,26,46,0), var(--bg) 35%);
  }

  .chat-messages {
    padding: 12px;
  }

  .chat-nav {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    padding: 4px;
    background: rgba(22, 33, 62, 0.72);
    border: 1px solid var(--border);
    border-radius: 10px;
    backdrop-filter: blur(8px);
  }

  .chat-nav-btn {
    width: 30px;
    height: 30px;
  }

  .msg {
    max-width: calc(100% - 34px);
    padding: 11px 13px;
  }

  .chat-input-bar {
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
  }

  .chat-row {
    gap: 8px;
  }

  .chat-option-btn {
    flex: 1 1 100%;
  }

  .section-body {
    padding: 12px;
  }

  .condition-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 38px;
    gap: 6px;
  }

  .condition-row .cond-dim {
    grid-column: 1 / -1;
  }

  .condition-row .btn {
    min-width: 38px;
    min-height: 38px;
  }

  .option-row > div {
    flex-wrap: wrap;
  }

  .option-row > div .form-input {
    flex: 1 1 140px !important;
  }

  .field-list + div {
    flex-wrap: wrap;
  }

  .field-list + div .btn {
    width: 100%;
  }
}

@media (min-width: 768px) {
  .settings-section {
    padding: 18px;
    background: rgba(22, 33, 62, 0.5);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .chat-input-bar {
    padding-left: 24px;
    padding-right: 24px;
  }

  .msg {
    max-width: min(78%, 680px);
  }
}

@media (min-width: 1180px) {
  :root {
    --content-max: 1120px;
    --reader-max: 840px;
  }

  .home-scroll {
    max-width: var(--content-max);
  }
}

/* ===== Visual Refresh Layer ===== */
.chat-nav-btn {
  background: rgba(29, 35, 48, 0.88);
}
.chat-nav-btn:hover {
  border-color: rgba(255, 95, 109, 0.58);
}
.msg-ai {
  background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012)), var(--bg-card);
}
.msg-player {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  box-shadow: 0 10px 28px rgba(255, 95, 109, 0.16);
}
.msg-values {
  background: rgba(255,255,255,0.055);
  border: 1px solid var(--border);
}
.timeline-dot {
  background: var(--accent-strong);
}
.chat-input-bar {
  background: rgba(16, 19, 26, 0.94);
  backdrop-filter: blur(14px);
}
.chat-option-btn {
  background: rgba(255,255,255,0.045);
  border-radius: 999px;
}
.chat-option-btn:hover {
  border-color: rgba(255, 95, 109, 0.58);
}
.chat-textarea:focus {
  border-color: rgba(255, 95, 109, 0.68);
  box-shadow: 0 0 0 3px rgba(255, 95, 109, 0.12);
}
.chat-send {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  box-shadow: 0 10px 22px rgba(255, 95, 109, 0.22);
}
.numerical-panel {
  background: rgba(23, 27, 36, 0.96);
}
.numerical-toggle {
  background: rgba(255,255,255,0.018);
}
.num-row {
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.settings-section {
  margin-bottom: 18px;
}
.settings-section h3 {
  color: var(--text);
  margin-bottom: 14px;
}
.typing-indicator {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.editor-section {
  background: rgba(29, 35, 48, 0.72);
}
.section-header {
  background: rgba(255,255,255,0.025);
}
.section-header:hover {
  background: rgba(255,255,255,0.055);
}
.validation-panel {
  background: var(--bg-elevated);
}
.validation-panel.ok {
  border-color: rgba(101, 193, 140, 0.5);
}
.validation-panel.warning {
  border-color: rgba(240, 184, 79, 0.55);
}
.field-tag {
  background: rgba(255,255,255,0.055);
  color: #ffb0a0;
  border: 1px solid var(--border);
}

/* ===== Dialog ===== */
.dialog-host {
  position: fixed;
  inset: 0;
  z-index: 1000;
  pointer-events: none;
}
.dialog-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(7, 10, 16, 0.68);
  backdrop-filter: blur(8px);
  pointer-events: auto;
}
.dialog-panel {
  width: min(460px, calc(100vw - 32px));
  background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)), var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
  overflow: hidden;
}
.dialog-default {
  border-color: var(--border-strong);
}
.dialog-danger {
  border-color: rgba(255, 95, 109, 0.42);
}
.dialog-body {
  padding: 20px 20px 16px;
}
.dialog-title {
  font-size: 18px;
  line-height: 1.25;
  margin-bottom: 10px;
}
.dialog-message {
  margin: 0;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
}
.dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 14px 20px 20px;
  background: rgba(255,255,255,0.02);
}

@media (max-width: 767px) {
  .dialog-overlay {
    padding: 14px;
    align-items: flex-end;
  }
  .dialog-panel {
    width: 100%;
  }
  .dialog-actions {
    flex-direction: column-reverse;
  }
  .dialog-actions .btn {
    width: 100%;
  }
}
