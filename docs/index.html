<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>剧本模拟器</title>
  <style>:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-input: #0f3460;
  --text: #e6e6e6;
  --text-dim: #8892a4;
  --accent: #e94560;
  --accent-soft: rgba(233, 69, 96, 0.15);
  --border: #2a2a4a;
  --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d0d1a;
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow: hidden;
}

#app {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ===== Desktop / Tablet ===== */
@media (min-width: 500px) {
  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }
  #app[data-page="phone"] {
    width: 430px;
    max-width: 430px;
    max-height: 900px;
    border-radius: 24px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
    margin-top: 20px;
  }
  #app[data-page="editor"] {
    width: 100%;
    max-width: 860px;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
  }
  #app[data-page="editor"] .page-scroll {
    padding: 20px 24px;
  }
}

/* ===== Wide Desktop ===== */
@media (min-width: 900px) {
  #app[data-page="editor"] {
    max-width: 960px;
  }
  #app[data-page="editor"] .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  #app[data-page="editor"] .editor-grid > .editor-section {
    margin-bottom: 0;
  }
  #app[data-page="editor"] .editor-full {
    grid-column: 1 / -1;
  }
}

/* ===== Pages ===== */
.page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: absolute;
  top: 0; left: 0;
  animation: fadeIn 0.2s ease;
  overflow: hidden;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.page-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: calc(16px + var(--safe-bottom));
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 { font-size: 18px; font-weight: 600; flex: 1; }
.header-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
}
.header-btn:hover { color: var(--text); }

/* ===== Cards ===== */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--accent); }
.card h3 { font-size: 16px; margin-bottom: 6px; }
.card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.card-tag {
  display: inline-block;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 24px;
  border-radius: var(--radius);
  border: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  gap: 8px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-block { width: 100%; }
.btn-sm { padding: 8px 16px; font-size: 13px; }

/* ===== Form ===== */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.form-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-dim); }
select.form-input { appearance: none; }

/* ===== Setup Wizard ===== */
.wizard-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 24px 20px;
  flex: 1;
  overflow-y: auto;
}
.wizard-step h2 { font-size: 22px; margin-bottom: 8px; }
.wizard-step p { color: var(--text-dim); margin-bottom: 24px; font-size: 14px; }
.wizard-options { width: 100%; max-width: 400px; }
.wizard-option {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.wizard-option:hover, .wizard-option.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.wizard-progress {
  display: flex;
  gap: 6px;
  margin-bottom: 32px;
}
.wizard-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.wizard-dot.active { background: var(--accent); }
.wizard-dot.done { background: var(--text-dim); }
.wizard-nav {
  display: flex;
  gap: 10px;
  margin-top: 24px;
  width: 100%;
  max-width: 400px;
  flex-shrink: 0;
}
.wizard-nav .btn { flex-shrink: 0; white-space: nowrap; padding: 10px 16px; text-align: center; }
.wizard-nav .btn-block { flex: 1; min-width: 0; width: auto; }

/* ===== Chat ===== */
.chat-page { background: var(--bg); display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; position: relative; }
.chat-body { display: flex; flex: 1; min-height: 0; position: relative; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-right: 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.chat-messages::-webkit-scrollbar { display: none; }
.chat-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 2px;
  justify-content: center;
  flex-shrink: 0;
}
.chat-nav-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.chat-nav-btn:hover { color: var(--text); border-color: var(--accent); }
.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-ai {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
}
.msg-player {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
}
.msg-system {
  align-self: center;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 12px;
  padding: 6px 14px;
}
.msg-regen {
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  margin-top: 8px;
  padding: 4px 8px;
  display: inline-block;
  opacity: 0.6;
  transition: opacity 0.2s;
  border-radius: 6px;
}
.msg-regen:hover { opacity: 1; color: var(--accent); background: var(--accent-soft); }
.msg-values {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  padding: 4px 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  display: inline-block;
}

.chat-input-bar {
  padding: 12px 16px;
  padding-bottom: calc(12px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  background: var(--bg);
  z-index: 5;
}
.chat-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chat-option-btn {
  padding: 8px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.chat-option-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
.chat-row { display: flex; gap: 10px; }
.chat-textarea {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 42px;
  max-height: 120px;
  font-family: inherit;
}
.chat-textarea:focus { border-color: var(--accent); }
.chat-send {
  width: 42px; height: 42px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== Numerical Panel ===== */
.numerical-panel {
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  padding: 0 16px;
  flex-shrink: 0;
}
.numerical-panel.open {
  max-height: 200px;
  overflow-y: auto;
  padding: 12px 16px;
}
.numerical-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 12px;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.numerical-toggle:hover { color: var(--text); }
.num-group { margin-bottom: 12px; }
.num-group-title { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.num-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
}
.num-label { color: var(--text-dim); }
.num-value { font-weight: 600; font-variant-numeric: tabular-nums; }

/* ===== Settings ===== */
.settings-section { margin-bottom: 28px; }
.settings-section h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; }

/* ===== Memory Button ===== */
.memory-prompt {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  background: var(--accent-soft);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  animation: fadeIn 0.3s ease;
}
.memory-prompt:hover { filter: brightness(0.9); }

/* ===== Loading ===== */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  align-self: flex-start;
}
.typing-dot {
  width: 6px; height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ===== Empty State ===== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-dim);
  text-align: center;
  padding: 40px;
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; margin-bottom: 20px; }

/* ===== Editor Sections ===== */
.editor-section {
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--bg-card);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  user-select: none;
  transition: background 0.15s;
}
.section-header:hover { background: var(--bg-input); }
.section-header.open { border-bottom: 1px solid var(--border); }
.section-arrow { font-size: 10px; color: var(--text-dim); width: 14px; text-align: center; }
.section-body { padding: 12px 16px; }

/* ===== Field Tags (for forbidden / requirements) ===== */
.field-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.field-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 16px;
  font-size: 12px;
  line-height: 1.4;
}
.field-tag-x {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 14px;
  padding: 0 2px;
  line-height: 1;
  opacity: 0.7;
}
.field-tag-x:hover { opacity: 1; }

/* ===== Condition Rows ===== */
.condition-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.condition-row {
  display: flex;
  gap: 4px;
  align-items: center;
}

/* ===== Option Rows ===== */
.option-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.option-row {
  display: flex;
  gap: 4px;
  align-items: center;
}
</style>
</head>
<body>
  <div id="app"></div>
  <script>window.__SAMPLE_SCRIPT__ = {
  "name": "危险关系模拟器",
  "description": "情感拉扯、谎言压力、道德挣扎、修罗场。玩家在已有伴侣的情况下面对新情感诱惑，每个选择都影响未来走向。",
  "rules": {
    "writing_style": "文风像豆瓣/网络高热恋爱文。生活真实语气。直白描写，禁止文艺比喻过多。禁止油腻霸总感、老土剧情。当前阶段：{{stage}}。",
    "forbidden": [
      "禁止开局直接上床，哪怕捡尸也要有简短过程",
      "禁止见面三天爱得死去活来",
      "所有关系必须循序渐进",
      "禁止AI解释剧情或跳出角色",

      "角色拥有独立生活、独立情绪和独立判断，不会围绕玩家转",
      "禁止{{partner}}和{{target}}同时出场时一方完全沉默"
    ],
    "requirements": [
      "长描写、沉浸式互动",
      "每轮必须给选择（自由输入或选项）",
      "允许吃醋、修罗场、冷战等剧情",
      "情感必须有铺垫",
      "涉及{{partner}}时重点描写其情绪变化和细节动作",
      "涉及{{target}}时重点描写暧昧氛围和边界感"
    ]
  },
  "dimensions": [
    { "id": "love", "name": "爱意值", "scope": "对{{partner}}", "range": [0, 100], "initial": [85, 95] },
    { "id": "trust", "name": "信任值", "scope": "对{{partner}}", "range": [0, 100], "initial": [85, 95] },
    { "id": "suspicion", "name": "怀疑值", "scope": "{{partner}}对{{player}}", "range": [0, 100], "initial": [0, 10] },
    { "id": "heartbeat", "name": "心动值", "scope": "对{{target}}", "range": [0, 100], "initial": [0, 0] },

  ],
  "characters": [
    {
      "id": "player",
      "name": "玩家",

    },
    {
      "id": "partner",
      "name": "现任",
      "description": "玩家当前的伴侣。温柔但敏感，对{{player}}的变化会默默观察。有自己的社交圈和生活习惯，不是恋爱脑。察觉异常时会旁敲侧击而非直接质问。"
    },
    {
      "id": "target",

    }
  ],
  "events": [
    {
      "name": "现任试探",

      "description": "{{partner}}开始旁敲侧击，试探{{player}}的行踪和手机内容",

        "sticky": { "dims": { "suspicion": 2 }, "duration": 3 },

    {
      "name": "现任偷看手机",

      }

    {
      "name": "现任质问",
      "stage": 1,
      "trigger": { "suspicion": { "min": 70, "probability": 0.7 } },
      "description": "{{partner}}直接质问{{player}}最近的反常行为，情绪激动",
      "effects": {
        "sticky": { "dims": { "stress": 5, "love": -5 }, "duration": 3 },
        "cooldown": 6

    {

      "stage": 1,

    {

      "effects": {
        "sticky": { "dims": { "stress": 5 }, "duration": 3 },

    {
      "name": "玩家崩溃",
      "stage": 3,
      "trigger": {
        "op": "and",

          { "dim": "stress", "min": 50 }

      },
      "description": "{{player}}因愧疚和压力出现失眠、做噩梦，精神状态急剧下降",

        "cooldown": 5
      }
    },
    {
      "name": "修罗场",
      "stage": 3,
      "trigger": {
        "op": "and",
        "conditions": [
          { "dim": "suspicion", "min": 60 },
          { "dim": "heartbeat", "min": 50, "probability": 0.5 }
        ]
      },
      "description": "{{partner}}和{{target}}在同一场合出现，气氛剑拔弩张，三方对峙",
      "effects": {
        "sticky": { "dims": { "stress": 8, "suspicion": 5 }, "duration": 3 },
        "cooldown": 8
      }
    },
    {
      "name": "冷战开始",
      "stage": 2,
      "trigger": {
        "op": "and",
        "conditions": [
          { "dim": "suspicion", "min": 40 },
          { "dim": "trust", "max": 40 }
        ]
